<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #2b2b2b; overflow: hidden; font-family: system-ui, sans-serif; }
  #toolbar {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    height: 36px; background: #1e1e1e; border-bottom: 1px solid #333; flex-shrink: 0;
    user-select: none;
  }
  #toolbar button {
    background: #333; color: #ccc; border: none; border-radius: 4px;
    width: 28px; height: 28px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center;
  }
  #toolbar button:hover { background: #444; }
  #toolbar button:disabled { opacity: 0.4; cursor: default; }
  #toolbar span { color: #aaa; font-size: 12px; min-width: 80px; text-align: center; }
  #toolbar .zoom-label { min-width: 50px; }
  #pages {
    width: 100%; height: calc(100% - 36px); overflow-y: auto; overflow-x: auto;
    display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 12px 0;
  }
  .page-canvas { background: #fff; box-shadow: 0 1px 4px rgba(0,0,0,0.4); }
  #loading {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
    color: #aaa; font-size: 13px;
  }
  #error {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
    color: #e55; font-size: 13px; text-align: center;
  }
</style>
</head>
<body>
<div id="toolbar">
  <button id="prev" title="Previous page">&#9664;</button>
  <span id="info">Loading...</span>
  <button id="next" title="Next page">&#9654;</button>
  <button id="zoom-out" title="Zoom out">-</button>
  <span id="zoom" class="zoom-label">100%</span>
  <button id="zoom-in" title="Zoom in">+</button>
</div>
<div id="pages"></div>
<div id="loading">Loading PDF...</div>
<div id="error" style="display:none"></div>
<script type="module">
  import * as pdfjsLib from './vendor/pdfjs/pdf.min.mjs';

  try { pdfjsLib.GlobalWorkerOptions.workerSrc = 'vendor/pdfjs/pdf.worker.min.mjs'; } catch(e) {}

  const params = new URLSearchParams(location.search);
  const rawUrl = params.get('url');
  if (!rawUrl) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = '';
    document.getElementById('error').textContent = 'No PDF URL provided.';
    throw new Error('No URL');
  }

  const pdfUrl = decodeURIComponent(rawUrl);

  const container = document.getElementById('pages');
  const infoEl = document.getElementById('info');
  const zoomEl = document.getElementById('zoom');
  const loadingEl = document.getElementById('loading');
  const errorEl = document.getElementById('error');
  const prevBtn = document.getElementById('prev');
  const nextBtn = document.getElementById('next');
  const zoomInBtn = document.getElementById('zoom-in');
  const zoomOutBtn = document.getElementById('zoom-out');

  let pdfDoc = null;
  let scale = 1.5;
  const BASE_SCALE = 1.5;
  let renderedPages = new Set();
  let observer = null;

  try {
    const loadingTask = pdfjsLib.getDocument({ url: pdfUrl, disableAutoFetch: false, disableStream: false });
    pdfDoc = await loadingTask.promise;
    loadingEl.style.display = 'none';
    infoEl.textContent = `1 / ${pdfDoc.numPages}`;
    prevBtn.disabled = true;

    observer = new IntersectionObserver((entries) => {
      for (const e of entries) {
        if (e.isIntersecting) {
          const pg = parseInt(e.target.dataset.page);
          if (pg && !renderedPages.has(pg)) renderPage(pg);
        }
      }
    }, { root: container, rootMargin: '400px' });

    await renderPage(1);
    for (let i = 2; i <= Math.min(5, pdfDoc.numPages); i++) renderPage(i);

  } catch (e) {
    loadingEl.style.display = 'none';
    errorEl.style.display = '';
    errorEl.textContent = 'Failed to load PDF: ' + e.message;
  }

  async function renderPage(num) {
    if (renderedPages.has(num)) return;
    renderedPages.add(num);
    const page = await pdfDoc.getPage(num);
    const vp = page.getViewport({ scale });
    const canvas = document.createElement('canvas');
    canvas.className = 'page-canvas';
    canvas.dataset.page = num;
    canvas.width = vp.width;
    canvas.height = vp.height;
    const existing = container.querySelectorAll('.page-canvas');
    let inserted = false;
    for (const el of existing) {
      if (parseInt(el.dataset.page) > num) { container.insertBefore(canvas, el); inserted = true; break; }
    }
    if (!inserted) container.appendChild(canvas);
    const ctx = canvas.getContext('2d');
    await page.render({ canvasContext: ctx, viewport: vp }).promise;
    if (observer) observer.observe(canvas);
  }

  function updateInfo() {
    const canvases = container.querySelectorAll('.page-canvas');
    let topPage = 1;
    for (const c of canvases) {
      const rect = c.getBoundingClientRect();
      const cr = container.getBoundingClientRect();
      if (rect.top - cr.top < cr.height / 2) topPage = parseInt(c.dataset.page);
    }
    infoEl.textContent = `${topPage} / ${pdfDoc.numPages}`;
    prevBtn.disabled = topPage <= 1;
    nextBtn.disabled = topPage >= pdfDoc.numPages;
  }

  container.addEventListener('scroll', updateInfo);

  prevBtn.addEventListener('click', () => {
    const canvases = container.querySelectorAll('.page-canvas');
    const cr = container.getBoundingClientRect();
    for (const c of canvases) {
      const rect = c.getBoundingClientRect();
      if (rect.top - cr.top >= cr.height / 2 - 10) {
        c.scrollIntoView({ behavior: 'smooth', block: 'start' });
        return;
      }
    }
  });

  nextBtn.addEventListener('click', () => {
    const canvases = container.querySelectorAll('.page-canvas');
    const cr = container.getBoundingClientRect();
    for (const c of canvases) {
      const rect = c.getBoundingClientRect();
      if (rect.top - cr.top > 10) {
        c.scrollIntoView({ behavior: 'smooth', block: 'start' });
        return;
      }
    }
  });

  async function rerenderAll() {
    renderedPages.clear();
    container.innerHTML = '';
    for (let i = 1; i <= pdfDoc.numPages; i++) await renderPage(i);
    zoomEl.textContent = Math.round(scale / BASE_SCALE * 100) + '%';
  }

  zoomInBtn.addEventListener('click', () => { scale = Math.min(scale * 1.2, 5); rerenderAll(); });
  zoomOutBtn.addEventListener('click', () => { scale = Math.max(scale / 1.2, 0.25); rerenderAll(); });

  container.addEventListener('wheel', (e) => {
    if (!e.ctrlKey) return;
    e.preventDefault();
    const delta = e.deltaY > 0 ? -1 : 1;
    scale = Math.max(0.25, Math.min(5, scale * (1 + delta * 0.1)));
    rerenderAll();
  }, { passive: false });
</script>
</body>
</html>
