<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1b2e"/>
      <stop offset="100%" stop-color="#0f1019"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7aa2f7"/>
      <stop offset="100%" stop-color="#bb9af7"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9ece6a"/>
      <stop offset="100%" stop-color="#73daca"/>
    </linearGradient>
    <clipPath id="round">
      <rect x="0" y="0" width="512" height="512" rx="108" ry="108"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg)"/>

  <!-- Subtle border -->
  <rect x="4" y="4" width="504" height="504" rx="104" ry="104" fill="none" stroke="#7aa2f7" stroke-opacity="0.15" stroke-width="2"/>

  <!-- Main terminal window -->
  <g clip-path="url(#round)">
    <!-- Terminal titlebar -->
    <rect x="48" y="72" width="416" height="44" rx="8" ry="8" fill="#1e2030"/>
    <circle cx="78" cy="94" r="7" fill="#f7768e"/>
    <circle cx="100" cy="94" r="7" fill="#e0af68"/>
    <circle cx="122" cy="94" r="7" fill="#9ece6a"/>

    <!-- Left pane -->
    <rect x="48" y="124" width="200" height="310" fill="#1a1b26" stroke="#2f3347" stroke-width="1.5"/>
    <!-- Left pane content lines -->
    <rect x="68" y="152" width="90" height="10" rx="3" fill="#7aa2f7" opacity="0.8"/>
    <rect x="68" y="172" width="130" height="10" rx="3" fill="#565f89" opacity="0.5"/>
    <rect x="68" y="192" width="110" height="10" rx="3" fill="#565f89" opacity="0.5"/>
    <!-- Cursor in left pane -->
    <rect x="68" y="218" width="12" height="16" rx="2" fill="#9ece6a"/>

    <!-- Right pane (split) -->
    <rect x="256" y="124" width="208" height="150" fill="#1a1b26" stroke="#2f3347" stroke-width="1.5"/>
    <!-- Right top pane content -->
    <rect x="276" y="152" width="80" height="10" rx="3" fill="#bb9af7" opacity="0.8"/>
    <rect x="276" y="172" width="120" height="10" rx="3" fill="#565f89" opacity="0.5"/>
    <rect x="276" y="192" width="100" height="10" rx="3" fill="#565f89" opacity="0.5"/>

    <!-- Right bottom pane -->
    <rect x="256" y="282" width="208" height="152" fill="#1a1b26" stroke="#2f3347" stroke-width="1.5"/>
    <!-- Right bottom pane content -->
    <rect x="276" y="310" width="100" height="10" rx="3" fill="#ff9e64" opacity="0.8"/>
    <rect x="276" y="330" width="140" height="10" rx="3" fill="#565f89" opacity="0.5"/>
    <!-- Cursor in bottom right -->
    <rect x="276" y="356" width="12" height="16" rx="2" fill="#9ece6a"/>
  </g>

  <!-- Glow accent on top edge -->
  <rect x="48" y="70" width="416" height="3" rx="1.5" fill="url(#accent)" opacity="0.6"/>
</svg>
