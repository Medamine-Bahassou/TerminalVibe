<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terminus</title>
<link rel="stylesheet" href="vendor/xterm/xterm.css">
<link rel="stylesheet" href="style.css">
<script src="vendor/xterm/xterm.js"></script>
<script src="vendor/xterm/xterm-addon-fit.js"></script>
<script src="vendor/xterm/xterm-addon-web-links.js"></script>
<script src="vendor/xterm/xterm-addon-search.js"></script>
<script src="vendor/xterm/xterm-addon-unicode11.js"></script>
<script src="vendor/xterm/xterm-addon-webgl.js"></script>
</head>
<body>
<!-- ── Custom Titlebar (Tauri) ── -->
<div id="titlebar" data-tauri-drag-region>
  <div class="titlebar-drag" data-tauri-drag-region>
    <img src="logo-app.svg" alt="Terminus" class="titlebar-logo" data-tauri-drag-region>
    <button id="titlebar-sidebar-toggle" class="titlebar-btn" title="Toggle sidebar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <line x1="9" y1="3" x2="9" y2="21"/>
      </svg>
    </button>
  </div>
  <div class="titlebar-controls">
    <button id="titlebar-minimize" title="Minimize">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
    <button id="titlebar-maximize" title="Maximize">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="5" width="14" height="14" rx="2"/></svg>
    </button>
    <button id="titlebar-close" title="Close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>
    </button>
  </div>
</div>
<div id="app">
  <!-- ── Sidebar ── -->
  <nav id="sidebar">
    <!-- workspace buttons injected here -->
    <div class="sidebar-actions">
      <div class="sa-btn" id="btn-settings" title="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      </div>
    </div>
  </nav>
  <div id="main">
    <!-- ── Pane area ── -->
    <div id="pane-area">
      <div id="empty-state" class="empty-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="3" width="20" height="18" rx="3"/>
          <polyline points="8,9 4.5,12 8,15"/>
          <line x1="12" y1="15" x2="16" y2="15"/>
        </svg>
        <p>No terminal open — press <kbd>Ctrl+Shift+T</kbd> or click <kbd>+</kbd></p>
      </div>
      <!-- split containers injected here -->

      <!-- Search overlay -->
      <div id="searchbar">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="opacity:0.5;flex-shrink:0"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="search-input" placeholder="Search…" spellcheck="false" autocomplete="off">
        <span class="sb-nav" id="search-prev" title="Previous">▲</span>
        <span class="sb-nav" id="search-next" title="Next">▼</span>
        <span class="sb-close-btn" id="search-close">✕</span>
      </div>
    </div>

    <!-- ── Status bar ── -->
    <div id="statusbar">
      <span class="sb-item"><span class="sb-icon">⬡</span><span id="sb-ws">—</span></span>
      <span class="sb-sep"></span>
      <span class="sb-item" id="sb-term">—</span>
      <span class="sb-sep"></span>
      <span class="sb-item" id="sb-conn">
        <span id="sb-conn-dot" style="display:inline-block;width:6px;height:6px;border-radius:50%;background:#a6e3a1;margin-right:3px"></span>
        <span id="sb-conn-text">Connecting…</span>
      </span>
      <span class="sb-spacer"></span>
      <span class="sb-item" id="sb-size">—</span>
      <span class="sb-sep"></span>
      <span class="sb-item" id="sb-time">—</span>
    </div>
  </div>
</div>

<!-- Context menu -->
<div id="ctx"></div>
<!-- Prompt modal -->
<div id="prompt-overlay">
  <div id="prompt-modal">
    <div id="prompt-label"></div>
    <input id="prompt-input" type="text" spellcheck="false" />
    <div id="prompt-colors" style="display:none">
      <div class="prompt-colors-label">Tab color</div>
      <div class="prompt-colors-row">
        <div class="prompt-swatch active" data-color="" title="None"><span>✕</span></div>
        <div class="prompt-swatch" data-color="#f38ba8" title="Red" style="background:#f38ba8"></div>
        <div class="prompt-swatch" data-color="#fab387" title="Orange" style="background:#fab387"></div>
        <div class="prompt-swatch" data-color="#f9e2af" title="Yellow" style="background:#f9e2af"></div>
        <div class="prompt-swatch" data-color="#a6e3a1" title="Green" style="background:#a6e3a1"></div>
        <div class="prompt-swatch" data-color="#89b4fa" title="Blue" style="background:#89b4fa"></div>
        <div class="prompt-swatch" data-color="#cba6f7" title="Purple" style="background:#cba6f7"></div>
        <div class="prompt-swatch" data-color="#f5c2e7" title="Pink" style="background:#f5c2e7"></div>
      </div>
    </div>
    <div class="prompt-actions">
      <button id="prompt-cancel">Cancel</button>
      <button id="prompt-ok">OK</button>
    </div>
  </div>
</div>
<!-- Settings -->
<div id="settings-overlay" tabindex="-1">
  <div id="settings-modal">
    <div class="settings-header">
      <h2>Settings</h2>
      <div class="settings-close" id="settings-close">✕</div>
    </div>
    <div class="settings-layout">
      <div class="settings-sidebar">
        <div class="settings-cat-btn active" data-cat="appearance">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a10 10 0 010 20"/><circle cx="12" cy="12" r="3"/></svg>
          <span>Appearance</span>
        </div>
        <div class="settings-cat-btn" data-cat="terminal">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
          <span>Terminal</span>
        </div>
        <div class="settings-cat-btn" data-cat="shortcuts">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="4" width="20" height="16" rx="2"/><line x1="6" y1="8" x2="6" y2="8.01"/><line x1="10" y1="8" x2="10" y2="8.01"/><line x1="14" y1="8" x2="14" y2="8.01"/><line x1="18" y1="8" x2="18" y2="8.01"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="6" y1="16" x2="6" y2="16.01"/><line x1="18" y1="16" x2="18" y2="16.01"/></svg>
          <span>Shortcuts</span>
        </div>
      </div>
      <div class="settings-body">
        <div class="settings-section" data-cat="appearance">
          <div class="settings-section-title">Appearance</div>
          <div class="settings-row">
            <span class="settings-label">Theme</span>
            <div class="settings-control">
              <select id="set-theme" class="native-select-hidden"></select>
              <div class="custom-dropdown" data-for="set-theme"></div>
            </div>
          </div>
          <div class="settings-row">
            <span class="settings-label">Font size</span>
            <div class="settings-control">
              <input type="range" id="set-fontsize" min="8" max="32" step="1">
              <span class="settings-value" id="set-fontsize-val"></span>
            </div>
          </div>
          <div class="settings-row">
            <span class="settings-label">Font family</span>
            <div class="settings-control">
              <input type="text" id="set-fontfamily" spellcheck="false" autocomplete="off">
            </div>
          </div>
          <div class="settings-row">
            <span class="settings-label">Line height</span>
            <div class="settings-control">
              <input type="range" id="set-lineheight" min="1.0" max="2.0" step="0.1">
              <span class="settings-value" id="set-lineheight-val"></span>
            </div>
          </div>
        </div>
        <div class="settings-section" data-cat="terminal">
          <div class="settings-section-title">Terminal</div>
          <div class="settings-row">
            <span class="settings-label">Cursor style</span>
            <div class="settings-control">
              <select id="set-cursor" class="native-select-hidden">
                <option value="block">Block</option>
                <option value="underline">Underline</option>
                <option value="bar">Bar</option>
              </select>
              <div class="custom-dropdown" data-for="set-cursor"></div>
            </div>
          </div>
          <div class="settings-row">
            <span class="settings-label">Cursor blink</span>
            <div class="settings-control">
              <div class="toggle-switch" id="set-cursorblink"></div>
            </div>
          </div>
          <div class="settings-row">
            <span class="settings-label">Scrollback</span>
            <div class="settings-control">
              <input type="range" id="set-scrollback" min="1000" max="50000" step="1000">
              <span class="settings-value" id="set-scrollback-val"></span>
            </div>
          </div>
        </div>
        <div class="settings-section" data-cat="shortcuts">
          <div class="settings-section-title shortcuts-section-header">
            <span>Keyboard Shortcuts</span>
            <span class="shortcuts-reset" id="shortcuts-reset">Reset to defaults</span>
          </div>
          <div class="settings-shortcuts" id="shortcuts-list"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="vendor/split.min.js"></script>
<script src="app.js"></script>
</body>
</html>
